<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    {% if title %}
        <title>StudApp - {{title}}</title>
    {% else %}
        <title>StudApp</title>
    {% endif %}

    <meta name="description" content = "Student App">
    <meta name = "author" content = "Amanda Ismaili">

    <meta property="og:title" content = "StudApp">
    <meta property="og:type" content = "website">
    <meta property = "og:image" content ="">
    <meta property="og:url" content = "">

    <link rel="preconnect" href= "https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
          rel="stylesheet"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
          crossorigin="anonymous">

    <link rel = "stylesheet" type = "text/css" href="/frontend/main.css">
    
    <meta name="theme-color" content="#6a89a7">

</head>

<body class="d-flex flex-column min-vh-100">
    <header class = "site-header">
        <nav class="navbar navbar-expand-mb bg-steek fixed top" data-bs-theme="dark">
            <div class = "container">
                <a class="navbar-brand me-4" href="#">StudApp</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarToggle"
                        aria-controls = "narvbarToggle" aria-expanded="false" aria-label="Toggle navigation">
                    <span class = "navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarToggle">
                    <div class="narvbar-nav me-auto">
                        <a class="nav-link active" aria-current="page" href="#">Home</a>
                    </div>
                    <div class="navbar-nav">
                        <a class="btn btn-outline-light mb-2 mb-mb-0 mb-mb-2" href="#">Login</a>
                        <a class="btn btn-light mb-2 mb-mb-0 mb-mb-3" href="#">Register</a>
                        <div class="nav-item dropdown">
                            <a class="nav-link dropdown-toggle" href="#" role="button" id="bd-theme"
                               data-bs-toggle="dropdown" aria-expanded="false">
                               <span id="bd-theme-text">Auto</span>
                            </a>
                            <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="bd-them">
                                <li>
                                    <button class="dropdown-item" type="button" data-bs-theme-value="light">🌝</button>
                                </li>
                                <li>
                                    <button class="dropdown-item" type="button" data-bs-theme-value="dark">🌚</button>
                                </li>
                                <li>
                                    <button class="dropdown-item" type="button" data-bs-theme-value="auto">🌗</button>
                                </li>
                            </ul>
                        </div>
                    </div>
                </div>
            </div>
        </nav>
    </header>
</body>
</html>
